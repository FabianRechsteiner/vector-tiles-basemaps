<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>vector-tiles-basemaps Demo</title>
    <link href="https://unpkg.com/maplibre-gl@5.14.0/dist/maplibre-gl.css" rel="stylesheet">
    <link href="./dist/style.css" rel="stylesheet">
    <script src="https://unpkg.com/maplibre-gl@5.14.0/dist/maplibre-gl.js"></script>
    <script type="importmap">
        {
            "imports": {
                "pmtiles": "https://cdn.jsdelivr.net/npm/pmtiles@4.3.0/+esm"
            }
        }
    </script>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            --panel-bg: rgba(255, 255, 255, 0.92);
            --panel-border: rgba(148, 163, 184, 0.38);
            --panel-shadow: 0 24px 60px rgba(15, 23, 42, 0.16);
            --page-bg: radial-gradient(circle at top left, #dff3ff 0%, #eef4f7 34%, #dfe7ea 100%);
            --text-main: #0f172a;
            --text-subtle: #475569;
            --accent: #0f766e;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: var(--page-bg);
            color: var(--text-main);
            display: grid;
            grid-template-columns: minmax(280px, 360px) 1fr;
            min-height: 100vh;
            overflow: hidden;
        }

        aside {
            backdrop-filter: blur(18px);
            background: var(--panel-bg);
            border-right: 1px solid var(--panel-border);
            box-shadow: var(--panel-shadow);
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding: 28px 24px;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 1.6rem;
            line-height: 1.1;
            margin: 0;
        }

        p {
            color: var(--text-subtle);
            line-height: 1.45;
            margin: 0;
        }

        .panel {
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 18px;
            display: grid;
            gap: 10px;
            padding: 16px;
        }

        .panel h2 {
            font-size: 0.95rem;
            margin: 0;
        }

        dl {
            display: grid;
            gap: 10px;
            margin: 0;
        }

        #basemapMeta > div {
            display: grid;
            gap: 2px;
        }

        dt {
            color: var(--text-subtle);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        dd {
            margin: 2px 0 0;
        }

        code {
            background: rgba(148, 163, 184, 0.14);
            border-radius: 8px;
            padding: 2px 6px;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .map-shell {
            min-width: 0;
            position: relative;
        }

        .intro {
            display: grid;
            gap: 10px;
        }

        @media (max-width: 960px) {
            body {
                grid-template-columns: 1fr;
                grid-template-rows: auto minmax(52vh, 1fr);
                overflow: auto;
            }

            aside {
                border-bottom: 1px solid var(--panel-border);
                border-right: 0;
                gap: 14px;
                padding: 20px 18px;
            }

            h1 {
                font-size: 1.35rem;
            }

            .panel {
                padding: 14px;
            }

            .map-shell,
            #map {
                min-height: 52vh;
            }
        }

        @media (max-width: 640px) {
            body {
                grid-template-rows: auto minmax(58vh, 1fr);
            }

            aside {
                padding: 18px 16px;
            }

            h1 {
                font-size: 1.2rem;
            }

            p {
                font-size: 0.95rem;
                line-height: 1.5;
            }
        }

        @media (max-width: 640px) and (orientation: portrait) {
            body {
                grid-template-rows: auto minmax(64vh, 1fr);
            }

            aside {
                gap: 12px;
                padding: 16px 14px;
            }

            .panel {
                gap: 8px;
                padding: 12px;
            }

            #basemapMeta {
                column-gap: 12px;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                row-gap: 8px;
            }

            dt {
                font-size: 0.66rem;
            }

            dd {
                font-size: 0.95rem;
                word-break: break-word;
            }
        }
    </style>
</head>
<body>
    <aside>
        <div class="intro">
            <h1>vector-tiles-basemaps</h1>
            <p>
                Explore openly usable vector basemaps for MapLibre and switch between them instantly.
                The compact picker in the lower-left corner previews each style directly on the map.
            </p>
        </div>

        <section class="panel">
            <h2>Current Basemap</h2>
            <dl id="basemapMeta"></dl>
        </section>
    </aside>

    <main class="map-shell">
        <div id="map"></div>
    </main>

    <script type="module">
        import * as pmtiles from "pmtiles";
        import {
            applyBasemap,
            createBasemapControl,
            getBasemap,
            listBasemaps,
            registerPmtilesProtocol,
        } from "./dist/index.js";

        const defaultBasemapId = "vectormap.light";
        const metaTarget = document.getElementById("basemapMeta");

        registerPmtilesProtocol(maplibregl, pmtiles);

        const map = new maplibregl.Map({
            container: "map",
            style: {
                version: 8,
                sources: {},
                layers: [
                    {
                        id: "background",
                        type: "background",
                        paint: {
                            "background-color": "#e5edf3"
                        }
                    }
                ]
            },
            center: [8.7241, 47.4988],
            zoom: 10.8,
            pitch: 0,
            bearing: 0
        });

        map.addControl(new maplibregl.NavigationControl(), "top-right");

        function renderBasemapMeta(basemap) {
            metaTarget.innerHTML = "";

            const rows = [
                ["Name", basemap.name],
                ["ID", basemap.id],
                ["Provider", basemap.provider],
                ["Variant", basemap.variant],
                ["Coverage", basemap.coverage],
            ];

            for (const [term, value] of rows) {
                const wrapper = document.createElement("div");
                const dt = document.createElement("dt");
                const dd = document.createElement("dd");
                dt.textContent = term;
                dd.innerHTML = value;
                wrapper.append(dt, dd);
                metaTarget.appendChild(wrapper);
            }
        }

        await applyBasemap(map, defaultBasemapId, {
            repositionIfOutsideCoverage: true
        });
        renderBasemapMeta(getBasemap(defaultBasemapId));

        map.addControl(
            createBasemapControl({
                basemapIds: listBasemaps({ sourceType: ["vector", "hybrid"] }).map((definition) => definition.id),
                initialBasemapId: defaultBasemapId,
                groupBy: "variant",
                position: "bottom-left",
                applyOptions: {
                    repositionIfOutsideCoverage: true
                },
                onChange: renderBasemapMeta,
                onPreview: renderBasemapMeta
            })
        );
    </script>
</body>
</html>
